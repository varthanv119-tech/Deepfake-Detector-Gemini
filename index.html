<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Deepfake Detector</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 400px; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn { width: 100%; padding: 12px; background: #22c55e; border: none; border-radius: 8px; color: #0f172a; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .result { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px; border-left: 5px solid #22c55e; }
        input[type="file"] { margin: 15px 0; }
        img { width: 100%; border-radius: 10px; margin-top: 15px; }
        .loader { display: none; color: #3b82f6; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Deepfake Detector</h2>
        <p style="color: #94a3b8;">Powered by Google Gemini AI</p>
        <form id="form" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" id="fileInput" required>
            <button type="submit" class="btn">Analyze Image</button>
        </form>
        <div id="loader" class="loader">Gemini AI is analyzing...</div>
        {% if image_file %}
            <img src="{{ url_for('static', filename='../uploads/' + image_file) }}">
        {% endif %}
        {% if result %}
            <div class="result">
                <strong>Verdict:</strong> {{ result }}
            </div>
        {% endif %}
    </div>
    <script>
        document.getElementById("form").onsubmit = () => { document.getElementById("loader").style.display = "block"; };
    </script>
</body>
</html>
